name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Codex Review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            このPRの変更内容をコードレビューしてください。
            以下の観点で確認し、問題があれば具体的なファイルと行番号を示してください。
            - バグや潜在的な不具合
            - セキュリティ上の問題
            - パフォーマンスの問題
            - コードの可読性・保守性
            問題がなければ「問題なし」と回答してください。
      - name: Post Review Comment
        if: always()
        uses: actions/github-script@v7
        env:
          REVIEW_CONTENT: ${{ steps.codex.outputs.final-message }}
        with:
          script: |
            const review = process.env.REVIEW_CONTENT;
            if (review) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Codex Code Review\n\n${review}`
              });
            }
